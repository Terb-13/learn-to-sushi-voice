app = "learn-to-sushi-voice"

[build]
  # Build context must be repo root — same as Railway.
  #   fly deploy . --config apps/voice-sms/fly.toml
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
