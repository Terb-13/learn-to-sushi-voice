# Voice + SMS (shared monorepo with packages/core)
#
# Dashboard (Service → Settings):
# - Root directory: leave EMPTY or “/” (repository root). Required so the deploy
#   includes apps/voice-sms AND packages/ for Docker COPY.
#   Setting only apps/voice-sms (isolated monorepo) omits ../packages and breaks the image.
# - Config as code file: set to /railway.toml  (leading slash = path from repo root).
#   The config file does NOT follow Root Directory; if this path is wrong, snapshot
#   fails with “config file railway.toml does not exist”.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "apps/voice-sms/**",
  "packages/**",
  "Dockerfile",
  "railway.toml",
]

[deploy]
# Do NOT set startCommand here for this image unless you use a shell command where
# $PORT expands (e.g. sh -c "uvicorn … --port $PORT …"). Using sh -c '…${PORT:-8080}…'
# breaks: single quotes prevent expansion, uvicorn gets a non-numeric port and exits.
# The Dockerfile CMD runs uvicorn with correct ${PORT:-8080} expansion.
healthcheckPath = "/health"
